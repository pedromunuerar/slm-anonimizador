<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Modern Design</title>
    <!-- Usamos Google Fonts para una tipografía moderna -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Usamos FontAwesome para los iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- VARIABLES Y RESET --- */
        :root {
            --primary-color: #6C63FF; /* Color principal moderno */
            --primary-dark: #5a52d5;
            --bg-color: #f4f7fa;
            --text-color: #333;
            --text-light: #777;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: 1px solid rgba(255, 255, 255, 0.6);
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        /* --- FONDO DEL APP (Con efecto vidrio) --- */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            overflow: hidden; /* Para evitar scroll */
        }

        /* Decoración de fondo abstracta para resaltar el efecto Glassmorphism */
        .background-decor {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(to right, #a1c4fd, #c2e9fb);
            filter: blur(80px);
            opacity: 0.8;
            animation: float 6s infinite ease-in-out;
        }

        .circle-1 {
            width: 300px;
            height: 300px;
            top: -50px;
            left: -50px;
            background: #80d8ff;
        }

        .circle-2 {
            width: 250px;
            height: 250px;
            bottom: -50px;
            right: -50px;
            background: #fbc2eb;
            animation-delay: 1s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(20px, -20px); }
        }

        /* --- TARJETA DE LOGIN (EL GLASSMORPHISM) --- */
        .login-container {
            background: var(--glass-bg);
            backdrop-filter: blur(12px); /* Blur de fondo */
            -webkit-backdrop-filter: blur(12px);
            border: var(--glass-border);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow);
            position: relative;
            transform-style: preserve-3d;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h2 {
            color: var(--text-color);
            font-weight: 600;
            font-size: 1.8rem;
            margin-bottom: 5px;
        }

        .login-header p {
            color: var(--text-light);
            font-size: 0.9rem;
        }

        /* --- INPUTS DE TEXTO --- */
        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-color);
            font-weight: 500;
            font-size: 0.9rem;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #eee;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.9);
            transition: all 0.3s ease;
            outline: none;
            font-size: 0.95rem;
            color: var(--text-color);
        }

        .input-group input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(108, 99, 255, 0.1);
        }

        /* --- BOTÓN --- */
        .btn-login {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(to right, var(--primary-color), var(--primary-dark));
            color: white;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(108, 99, 255, 0.3);
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        /* --- BOTÓN RECAPTURA (Olvidaste contraseña) --- */
        .form-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 25px;
            font-size: 0.85rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            color: var(--text-light);
            cursor: pointer;
        }

        .remember-me input {
            margin-right: 5px;
            accent-color: var(--primary-color);
            width: 15px;
            height: 15px;
            cursor: pointer;
        }

        .forgot-password {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .forgot-password:hover {
            color: var(--primary-dark);
        }

        /* --- LINKS DE ÚLTIMO LOGIN --- */
        .last-login-container {
            margin-top: 25px;
            text-align: center;
            font-size: 0.85rem;
        }

        .last-login-container p {
            color: var(--text-light);
        }

        .last-login-container a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }

    </style>
</head>
<body>

    <!-- Fondos decorativos -->
    <div class="background-decor">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
    </div>

    <!-- Tarjeta de Login -->
    <div class="login-container">
        <div class="login-header">
            <h2>Bienvenido</h2>
            <p>Ingresa tus credenciales para continuar</p>
        </div>

        <form action="#">
            <div class="input-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" placeholder="nombre@ejemplo.com" required>
            </div>

            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login">Ingresar</button>
        </form>

        <div class="form-footer">
            <div class="remember-me">
                <input type="checkbox" id="remember">
                <label for="remember">Recordarme</label>
            </div>
            <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
        </div>

        <div class="last-login-container">
            <p>¿No tienes cuenta? <a href="#">Regístrate aquí</a></p>
        </div>
    </div>

</body>
</html>
