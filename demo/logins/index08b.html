<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login</title>
    <!-- Google Fonts for better typography -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* --- CSS VARIABLES --- */
        :root {
            --primary-color: #4f46e5; /* Indigo */
            --primary-hover: #4338ca;
            --bg-color: #0f172a; /* Dark Blue/Black background */
            --card-bg: #1e293b; /* Dark Gray Card */
            --text-color: #f1f5f9;
            --text-muted: #94a3b8;
            --success: #10b981;
        }

        /* --- GLOBAL STYLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-color);
        }

        /* --- LOGIN CONTAINER --- */
        .login-container {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        /* --- HEADER --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .header h2 {
            font-size: 1.5rem;
            font-weight: 600;
        }

        /* --- FORM --- */
        form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #334155;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-size: 1rem;
            outline: none;
        }

        input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
        }

        /* --- BUTTONS --- */
        .btn-submit {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s ease;
        }

        .btn-submit:hover {
            background-color: var(--primary-hover);
        }

        .btn-submit:active {
            transform: translateY(1px);
        }

        /* --- FOOTER --- */
        .footer {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* --- SOCIAL LOGOS (Optional) --- */
        .social-icons {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .social-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--bg-color);
            border: 1px solid #334155;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: var(--text-color);
            transition: 0.3s;
        }

        .social-btn:hover {
            border-color: var(--primary-color);
            background-color: var(--primary-color);
            color: white;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 480px) {
            .login-container {
                padding: 2rem 1.5rem;
            }
            .social-icons {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="header">
            <h2>Welcome Back</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Sign in to your account</p>
        </div>

        <form action="#">
            <input type="email" placeholder="Email Address" required>
            <input type="password" placeholder="Password" required>

            <button type="submit" class="btn-submit">Sign In</button>

            <div class="footer">
                <p>&copy; 2023 Your Company. All rights reserved.</p>
            </div>
        </form>

        <div class="social-icons">
            <div class="social-btn"><i class="fab fa-facebook-f"></i></div>
            <div class="social-btn"><i class="fab fa-google"></i></div>
        </div>
    </div>

    <script>
        // Simple script to handle the "Submit" click visually
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            // In a real app, you would send this data to a server here
            const btn = this.querySelector('.btn-submit');
            
            // Show a loading state
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
            btn.disabled = true;

            // Simulate API call (optional, to show it works without a server)
            console.log('Login Data:', { email: document.querySelector('input[type="email"]').value, password: document.querySelector('input[type="password"]').value });
            
            btn.innerHTML = originalText;
            btn.disabled = false;
        });
    </script>

</body>
</html>
